name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# macOS only. The project is developed and tested on Apple Silicon (Darwin 25,
# Apple clang / libc++) which has the C++23 stdlib features in use
# (std::flat_map, std::expected, std::format, std::span). Linux runners were
# dropped because the distro libstdc++ doesn't consistently provide those yet;
# epoll support is preserved in the source (net/epoll_poller.hpp) and can be
# re-enabled on CI once a sufficiently new Linux toolchain is available.

jobs:
  build-and-test:
    # macos-latest tracks the newest macOS GitHub ships (macOS 15 now,
    # migrating to macOS 26 in June 2026), on Apple Silicon. This matches the
    # dev environment (Darwin 25 / Apple clang / libc++) which has full C++23
    # stdlib support (std::flat_map, std::expected, std::format, std::span).
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure (Debug, sanitizers on)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build -j

      - name: Test
        working-directory: build
        run: ctest --output-on-failure

      # Release build without sanitizers to catch optimizer/codegen issues.
      - name: Configure (Release)
        run: cmake -S . -B build_rel -DCMAKE_BUILD_TYPE=Release -DMUSES_ENABLE_SANITIZERS=OFF
      - name: Build (Release)
        run: cmake --build build_rel -j
