name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Two jobs only:
#   - macOS (Apple clang) exercises the kqueue poller.
#   - Ubuntu (clang) exercises the epoll poller.
# We intentionally don't pin a third-party LLVM apt source: ubuntu-latest's
# bundled clang is recent enough for C++23 library features once libstdc++ is
# upgraded, and keeping the CI dependency-free is worth more than a second
# compiler on Linux for a project this size.

jobs:
  build-and-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      # Ubuntu's default g++ (13.x) lags on C++23 stdlib (std::flat_map etc.).
      # Install g++-14 from the distro's universe repo so libstdc++ backs the
      # C++23 features. No third-party apt sources/keys needed.
      - name: Update toolchain (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq g++-14

      - name: Set compiler
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            echo "CC=clang"   >> $GITHUB_ENV
            echo "CXX=clang++" >> $GITHUB_ENV
          else
            echo "CC=gcc-14"  >> $GITHUB_ENV
            echo "CXX=g++-14" >> $GITHUB_ENV
          fi

      - name: Configure (Debug, sanitizers on)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build -j

      - name: Test
        working-directory: build
        run: ctest --output-on-failure

      # Release build without sanitizers to catch optimizer/codegen issues.
      - name: Configure (Release)
        run: cmake -S . -B build_rel -DCMAKE_BUILD_TYPE=Release -DMUSES_ENABLE_SANITIZERS=OFF
      - name: Build (Release)
        run: cmake --build build_rel -j
