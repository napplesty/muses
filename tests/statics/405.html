<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>405 — Muses</title>
    <style>
        :root {
            --bg:        #26221e;
            --bg-elev:   #2f2a25;
            --border:    #3d362f;
            --text:      #d8d0c4;
            --text-dim:  #9a9189;
            --accent:    #c4694f;
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                         "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .wrap {
            text-align: center;
            padding: 2rem 1.5rem;
        }
        .code {
            font-size: clamp(6rem, 18vw, 11rem);
            font-weight: 800;
            line-height: 1;
            color: var(--accent);
            letter-spacing: -0.04em;
            margin: 0 0 1rem;
        }
        h1 {
            font-size: 1.6rem;
            margin: 0 0 1rem;
            color: #efe9dd;
            font-weight: 600;
        }
        p {
            color: var(--text-dim);
            font-size: 1.05rem;
            margin: 0 0 2.4rem;
            max-width: 420px;
        }
        .btn {
            display: inline-block;
            padding: 0.75rem 1.6rem;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            background-color: var(--accent);
            color: #1c1814;
            transition: background-color .15s ease;
        }
        .btn:hover { background-color: #d47960; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="code">405</div>
        <h1>Method not allowed</h1>
        <p>This server only serves GET requests for static files.</p>
        <a class="btn" href="/">Back to home</a>
    </div>
</body>
</html>
